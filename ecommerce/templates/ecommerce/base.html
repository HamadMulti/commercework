<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shop Hamad Stores{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom inline styles */
        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Ensures the footer stays at the bottom */
        }

        footer {
            background-color: #34495e; /* Dark background for footer */
            color: white; /* White text */
            padding: 2rem 0;
            text-align: center;
        }

        .page-title {
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 700;
            color: #f39c12;
        }

        .store-description {
            text-align: center;
            margin-bottom: 3rem;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #ecf0f1;
            background-color: #34495e;
            padding: 2rem;
            border-radius: 8px;
        }

        .product-card {
            width: 18rem;
            border: 1px solid #34495e;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
            background-color: #34495e;
        }

        .product-card:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.25);
        }

        .navbar-toggler {
            border: none;
            background-color: white; /* White background for the toggle button */
        }

        .navbar-toggler-icon {
            background-color: white; /* Ensure the icon is also white */
        }

        .navbar-collapse {
            justify-content: flex-end;
        }
    </style>
</head>
<body>

<!-- Header Section with Logo and Navigation Menu -->
<header class="bg-primary py-3">
    <div class="container d-flex justify-content-between align-items-center">
        <!-- Logo -->
        <img src="https://i.ibb.co/V2NDZY2/logo.png" alt="Hamad Stores Logo" style="height: 70px;">

        <!-- Navigation Menu -->
        <nav>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{% url 'home' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{% url 'product_list' %}">Products</a>
                    </li>
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link text-white" href="{% url 'view_orders' %}">My Orders</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="{% url 'logout' %}">Logout</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link text-white" href="{% url 'login' %}">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="{% url 'register' %}">Register</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </nav>
    </div>
</header>

<!-- Main Content Section -->
<div class="container my-5">
    {% block content %}
    <!-- Page-specific content goes here -->
    {% endblock %}
</div>

<!-- Footer Section -->
<footer>
    <div class="container">
        <p>&copy; 2024 Hamad Stores. All rights reserved.</p>
    </div>
</footer>

<!-- Bootstrap JS and custom script for responsive menu toggle -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

</body>
</html>
